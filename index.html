<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulateur Marlon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Jost', sans-serif; background: transparent; margin: 0; padding: 1px; }
  .sim { width: 100%; max-width: 880px; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 40px rgba(1,38,53,.08), 0 1px 4px rgba(1,38,53,.05); margin: 0 auto; }
  .sim-body { display: flex; align-items: stretch; padding: 36px; gap: 0; }
  .sim-block + .sim-block { border-left: 1px solid #eef0f3; padding-left: 32px; margin-left: 32px; }
  .sim-label { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #b0b7c3; margin-bottom: 12px; }
  .sim-block-amount { flex: 0 0 240px; }
  .amount-input-wrap { position: relative; display: flex; align-items: center; }
  .amount-input-wrap .currency { position: absolute; right: 14px; font-size: 15px; font-weight: 600; color: #9ca3af; pointer-events: none; }
  .amount-input { width: 100%; font-family: 'Jost', sans-serif; font-size: 32px; font-weight: 800; color: #012635; letter-spacing: -.02em; border: 1.5px solid #e5e7eb; border-radius: 12px; padding: 14px 52px 14px 18px; outline: none; transition: border-color .15s; background: #fff; -moz-appearance: textfield; }
  .amount-input::-webkit-outer-spin-button, .amount-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .amount-input:focus { border-color: #00bd82; }
  .amount-hint { margin-top: 10px; font-size: 12px; color: #b0b7c3; font-weight: 500; }
  .sim-block-duration { flex: 0 0 170px; }
  .dur-select { width: 100%; font-family: 'Jost', sans-serif; font-size: 20px; font-weight: 700; color: #012635; border: 1.5px solid #e5e7eb; border-radius: 12px; padding: 14px 40px 14px 16px; outline: none; cursor: pointer; appearance: none; background: #fff url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="12" height="8"><path d="M1 1l5 5 5-5" stroke="%23012635" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>') no-repeat right 14px center; transition: border-color .15s; }
  .dur-select:focus { border-color: #00bd82; }
  .sim-block-result { flex: 1 1 0; }
  .result-card { background: #012635; border-radius: 14px; padding: 18px 20px; }
  .result-ht { font-size: 36px; font-weight: 800; color: #00bd82; letter-spacing: -.03em; line-height: 1; }
  .result-unit { font-size: 13px; font-weight: 500; color: rgba(255,255,255,.35); margin-left: 3px; }
  .result-ttc { font-size: 12px; color: rgba(255,255,255,.3); margin-top: 4px; font-weight: 500; }
  .sim-footer { padding: 0 36px 28px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .sim-cta { display: inline-flex; align-items: center; gap: 8px; background: #00bd82; color: #fff; font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: .04em; padding: 14px 32px; border-radius: 12px; text-decoration: none; transition: background .15s, transform .1s, box-shadow .15s; box-shadow: 0 4px 16px rgba(0,189,130,.25); }
  .sim-cta:hover { background: #00a872; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,189,130,.35); }
  .sim-note { font-size: 11px; color: #c4c9d4; text-align: center; letter-spacing: .02em; }
  @media (max-width: 680px) {
    .sim-body { flex-direction: column; padding: 24px 20px 20px; gap: 24px; }
